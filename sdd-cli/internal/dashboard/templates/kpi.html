<div class="kpi-row">
  <div class="card cyan">
    <div class="label">Active Changes</div>
    <div class="value">{{.ActiveChanges}}</div>
  </div>
  <div class="card green">
    <div class="label">Total Tokens</div>
    <div class="value">{{.TotalTokens}}</div>
  </div>
  <div class="card purple">
    <div class="label">Cache Hit %</div>
    <div class="value">{{printf "%.0f" .CacheHitPct}}%</div>
  </div>
  <div class="card red">
    <div class="label">Errors</div>
    <div class="value">{{.ErrorCount}}</div>
  </div>
</div>
